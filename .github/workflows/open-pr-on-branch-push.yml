name: Auto Open PR

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "chore/**"
      - "ci/**"
      - "build/**"
      - "perf/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Open PR for pushed branch
    uses: javigomez/openspec-shipper/.github/workflows/open-pr-on-branch-push-reusable.yml@main
